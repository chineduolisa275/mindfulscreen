<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:380px;max-height:520px;overflow-y:auto;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#fff;color:#1e293b}
.header{padding:14px 16px;background:#22c55e;color:#fff;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.logo.critical{background:#ef4444;animation:pulse 1s infinite}
.app-name{font-size:14px;font-weight:700}
.app-sub{font-size:10px;opacity:0.85}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600}
.badge-healthy{background:rgba(255,255,255,0.25);color:#fff}
.badge-caution{background:#fef3c7;color:#92400e}
.badge-warning{background:#ffedd5;color:#9a3412}
.badge-critical{background:#fee2e2;color:#991b1b}
.badge-dot{width:6px;height:6px;border-radius:50%}
.badge-healthy .badge-dot{background:#fff}
.badge-caution .badge-dot{background:#f59e0b}
.badge-warning .badge-dot{background:#f97316}
.badge-critical .badge-dot{background:#ef4444;animation:pulse 1s infinite}
.ring-section{padding:20px;text-align:center;background:#fff;margin:10px;border-radius:14px;border:1px solid #dcfce7}
.ring-label{font-size:11px;color:#16a34a;margin-bottom:10px;font-weight:600}
.ring-container{position:relative;display:inline-block}
.ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-time{font-size:20px;font-weight:700;color:#1e293b;display:block}
.ring-limit{font-size:10px;color:#94a3b8}
.ring-percent{font-size:11px;color:#16a34a;margin-top:8px;font-weight:500}
.tabs{display:flex;gap:4px;padding:0 10px;margin-bottom:10px;overflow-x:auto}
.tab{padding:6px 10px;font-size:10px;font-weight:600;border-radius:8px;border:1px solid #dcfce7;background:#fff;color:#16a34a;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px}
.tab.active{background:#22c55e;color:#fff;border-color:#22c55e}
.tab:hover:not(.active){background:#f0fdf4}
.section{padding:0 10px 10px}
.card{background:#fff;border:1px solid #dcfce7;border-radius:14px;padding:14px;margin-bottom:10px}
.card-title{font-size:12px;font-weight:600;margin-bottom:10px;color:#166534}
.site-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0fdf4}
.site-row:last-child{border-bottom:none}
.site-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px}
.site-info{flex:1;min-width:0}
.site-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.site-meta{font-size:9px;color:#94a3b8;display:flex;gap:8px;margin-top:2px}
.site-cat{font-size:9px;padding:1px 6px;border-radius:4px;background:#f0fdf4}
.site-time{text-align:right}
.site-minutes{font-size:13px;font-weight:700}
.site-minutes.over{color:#ef4444}
.site-pct{font-size:9px;color:#94a3b8}
.site-bar{height:3px;background:#f0fdf4;border-radius:2px;margin-top:4px}
.site-bar-fill{height:3px;border-radius:2px}
.over-badge{font-size:8px;background:#fee2e2;color:#991b1b;padding:1px 6px;border-radius:10px;font-weight:600;margin-left:4px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
.stat-label{font-size:11px;color:#64748b;display:flex;align-items:center;gap:6px}
.stat-value{font-size:13px;font-weight:700;color:#166534}
.re-site{padding:10px;background:#f0fdf4;border-radius:10px;margin-bottom:8px}
.re-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.re-name{font-size:12px;font-weight:600}
.re-rate{font-size:11px;font-weight:700}
.re-rate.good{color:#16a34a}
.re-rate.bad{color:#ef4444}
.re-bars{display:flex;gap:8px}
.re-bar-group{flex:1}
.re-bar-label{display:flex;justify-content:space-between;font-size:9px;color:#94a3b8;margin-bottom:3px}
.re-bar-track{height:6px;background:#dcfce7;border-radius:3px}
.re-bar-fill{height:6px;border-radius:3px}
.re-bar-red{background:#f87171}
.re-bar-green{background:#22c55e}
.summary-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px;margin-top:10px}
.summary-title{font-size:11px;font-weight:600;color:#166534;margin-bottom:8px}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center}
.summary-num{font-size:16px;font-weight:700;color:#16a34a}
.summary-label{font-size:9px;color:#22c55e}
.empty{text-align:center;padding:30px;color:#94a3b8;font-size:12px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
</style>
</head>
<body>
<div class="header">
<div class="header-left">
<div class="logo" id="logo">MS</div>
<div><div class="app-name">MindfulScreen</div><div class="app-sub">Digital Wellbeing Monitor</div></div>
</div>
<div id="status-badge"></div>
</div>
<div class="ring-section" id="ring-section"></div>
<div class="tabs" id="tabs"></div>
<div class="section" id="content"></div>
<script src="popup.js"></script>
</body>
</html>
